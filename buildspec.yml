version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20  # UPDATED: Vite 8+ requires Node 20 or higher
    commands:
      - echo "Installing dependencies..."
      - npm ci  # Installs exact versions from package-lock.json

  pre_build:
    commands:
      - echo "Running tests..."
      - npm test  # Runs the test script defined in package.json

  build:
    commands:
      - echo "Building production bundle..."
      - npm run build  # Creates the 'dist/' folder

  post_build:
    commands:
      - echo "Build completed on $(date)"

artifacts:
  files:
    - '**/*'
  base-directory: 'dist'  # Uploads contents of the dist folder to S3 root
  discard-paths: no